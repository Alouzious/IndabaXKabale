services:
  - type: web
    name: indabax-backend
    root: backend
    runtime: rust:latest
    buildCommand: cargo build --release
    startCommand: ./target/release/indabax_backend
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: indabax_db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RUST_LOG
        value: info
      - key: PORT
        value: 8080

databases:
  - name: indabax_db
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all
